<!DOCTYPE html>
<html lang='en'>

<head>
  <meta charset='UTF-8' />
  <meta content='width=device-width, initial-scale=1.0' name='viewport' />
  <title></title>
  <link href='styles.css' rel='stylesheet' />
</head>

<body>
  <div id='app-shell' class='app-shell'>
    <header class='top-banner' id='top-banner'>
      <div class='logo' id='logo'>SimLab</div>
      <nav class='main-nav' id='main-nav'></nav>
    </header>
    <section class='tagline' id='tagline'></section>
    <section class='main-content' id='main-content'>
      <div class='breadcrumbs' id='breadcrumbs'></div>
      <div class='content-area' id='content-area'></div>
      <div class='context-area' id='context-area'></div>
      <div class='search-row' id='search-row'>
        <input class='search-text' id='search-text' type='text' />
        <button class='explore-button' id='explore-button'></button>
      </div>
      <div id='session-box' class='session-box'>
        <h4>Your views so far</h4>
        <div id='session-string'></div>
      </div>
    </section>
    <footer class='bottom-banner' id='bottom-banner'></footer>
    <script src='varFile.js'></script>
    <script src='app.js'></script>
  </div>
</body>

</html>
